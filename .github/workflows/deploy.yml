name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 147.93.104.150
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/mahalaxmi
            git pull origin main
            cd frontend
            npm install --omit=dev
            npm run build
            pm2 restart all
            echo "✅ Deploy complete at $(date)"
